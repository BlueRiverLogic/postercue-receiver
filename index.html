<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #splash {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #splash svg {
            width: 200px;
            height: 200px;
            opacity: 0.6;
        }
        #splash .label {
            position: absolute;
            bottom: 15%;
            color: #555;
            font-family: -apple-system, Helvetica Neue, Arial, sans-serif;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
        }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            visibility: hidden;
        }
        .layer.active {
            visibility: visible;
        }
    </style>
</head>
<body>
    <!-- Splash screen shown until first image arrives -->
    <div id="splash">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="5" width="80" height="90" rx="4" stroke="#555" stroke-width="2"/>
            <rect x="16" y="11" width="68" height="72" rx="2" stroke="#444" stroke-width="1"/>
            <circle cx="50" cy="47" r="12" stroke="#555" stroke-width="1.5"/>
            <path d="M50 35 L50 59 M38 47 L62 47" stroke="#555" stroke-width="1"/>
        </svg>
        <div class="label">PosterCue</div>
    </div>

    <!-- Image display layers -->
    <div id="canvas">
        <img id="img1" class="layer active">
        <img id="img2" class="layer">
    </div>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        var context = cast.framework.CastReceiverContext.getInstance();
        var NAMESPACE = 'urn:x-cast:com.postercue';

        var splash = document.getElementById('splash');
        var canvas = document.getElementById('canvas');
        var activeImg = document.getElementById('img1');
        var standbyImg = document.getElementById('img2');
        var currentRotation = 0;

        // ── Receiver Visibility Tracking ─────────────────────────────
        //
        // The receiver detects when it's hidden (Home button, HDMI input
        // switch, TV standby) and signals the iOS sender via the custom
        // channel. The sender uses this to decide whether to disconnect
        // and reconnect (triggering CEC foreground launch) on the next
        // image push, instead of pushing into a hidden receiver.
        //
        // Three independent detection sources:
        //   1. Page Visibility API  — Home button, launcher overlay
        //   2. VISIBILITY_CHANGED   — HDMI input switch, TV power
        //   3. STANDBY_CHANGED      — TV standby enter/exit
        //
        // Deduplication: only sends when receiverVisible actually
        // changes, since multiple sources may fire simultaneously
        // (e.g. standby triggers both STANDBY_CHANGED and
        // document.visibilitychange on some devices).

        var receiverVisible = true;

        function broadcastVisibility(isVisible, reason) {
            if (isVisible === receiverVisible) return;
            receiverVisible = isVisible;
            var msg = {
                event: 'visibilityChanged',
                isVisible: isVisible,
                reason: reason,
                ts: Date.now()
            };
            var senders = context.getSenders();
            for (var i = 0; i < senders.length; i++) {
                context.sendCustomMessage(NAMESPACE, senders[i].id, msg);
            }
            console.log('PosterCue visibility: ' + (isVisible ? 'VISIBLE' : 'HIDDEN') + ' reason=' + reason);
        }

        // Source 1: Page Visibility API — detects Home button press,
        // launcher overlay, and any other Android activity foregrounding
        // over the Cast receiver. This is the primary signal for the
        // "Home button hides receiver" scenario.
        document.addEventListener('visibilitychange', function() {
            broadcastVisibility(!document.hidden,
                document.hidden ? 'documentHidden' : 'documentVisible');
        });

        // Source 2: Cast SDK VISIBILITY_CHANGED — fires when the HDMI
        // input changes (user switches TV input away from Cast device)
        // or the TV powers off. Distinct from Page Visibility API which
        // tracks the Android app lifecycle, not the HDMI signal.
        context.addEventListener(
            cast.framework.system.EventType.VISIBILITY_CHANGED,
            function(event) {
                broadcastVisibility(event.isVisible,
                    event.isVisible ? 'hdmiInputActive' : 'hdmiInputChanged');
            }
        );

        // Source 3: Cast SDK STANDBY_CHANGED — fires when the TV enters
        // or exits standby mode (screen on/off). Complements the sender-
        // side GCKCastDeviceStatusListener standbyStatus callback.
        context.addEventListener(
            cast.framework.system.EventType.STANDBY_CHANGED,
            function(event) {
                broadcastVisibility(!event.isStandby,
                    event.isStandby ? 'standby' : 'standbyExit');
            }
        );

        function applyRotation(deg) {
            currentRotation = deg;
            var transform = '';
            if (deg === 90) {
                transform = 'rotate(90deg) translateY(-100%)';
                canvas.style.transformOrigin = 'top left';
                canvas.style.width = '100vh';
                canvas.style.height = '100vw';
            } else if (deg === 270) {
                transform = 'rotate(270deg) translateX(-100%)';
                canvas.style.transformOrigin = 'top left';
                canvas.style.width = '100vh';
                canvas.style.height = '100vw';
            } else if (deg === 180) {
                transform = 'rotate(180deg)';
                canvas.style.transformOrigin = 'center center';
                canvas.style.width = '100vw';
                canvas.style.height = '100vh';
            } else {
                transform = '';
                canvas.style.transformOrigin = 'center center';
                canvas.style.width = '100vw';
                canvas.style.height = '100vh';
            }
            canvas.style.transform = transform;
        }

        function sendMessage(senderId, payload) {
            context.sendCustomMessage(NAMESPACE, senderId, payload);
        }

        // ── CueTheShow: logging, telemetry & memory diagnostics ──────────
        //
        // The slideshow runs autonomously on the receiver after the iOS app
        // closes, so the receiver is our only eyes on what's happening. These
        // helpers give us (a) a leveled on-device log (visible via chrome://
        // inspect) and (b) telemetry pushed back to any still-connected sender
        // so it lands in PosterCue's Debug Logs during testing.

        var LOG_LEVELS = { error: 0, info: 1, verbose: 2 };
        var logLevel   = LOG_LEVELS.info;   // raised to verbose per-slideshow via msg.verbose
        var logRing    = [];                // last N lines, for on-device inspection
        var LOG_RING_MAX = 200;

        function tlog(level, msg) {
            if (LOG_LEVELS[level] > logLevel) return;
            var line = '[' + level + '] ' + msg;
            logRing.push(line);
            if (logRing.length > LOG_RING_MAX) logRing.shift();
            console.log('PosterCue ' + line);
        }

        // Chromium-only heap figures. IMPORTANT: this is the JS heap, NOT the
        // decoded-image / GPU memory where the slideshow frames actually live —
        // so treat it as a trend signal, not ground truth. The authoritative
        // OOM evidence is the sender-side silence watchdog (heartbeats stop).
        function heapStats() {
            try {
                var m = window.performance && window.performance.memory;
                if (!m) return null;
                return {
                    used:  m.usedJSHeapSize,
                    total: m.totalJSHeapSize,
                    limit: m.jsHeapSizeLimit,
                    pct:   m.jsHeapSizeLimit ? Math.round(m.usedJSHeapSize / m.jsHeapSizeLimit * 100) : null
                };
            } catch (e) { return null; }
        }

        // Broadcast a telemetry event to every connected sender (the triggering
        // sender may have closed, so we don't target a single id).
        function broadcast(event, extra) {
            var msg = { event: event, ts: Date.now() };
            if (extra) { for (var k in extra) { msg[k] = extra[k]; } }
            var senders = context.getSenders();
            for (var i = 0; i < senders.length; i++) {
                try { context.sendCustomMessage(NAMESPACE, senders[i].id, msg); } catch (e) {}
            }
        }

        // Best-effort crash reporting: a real OOM kills the page before it can
        // speak, but JS-level errors fire these first — ship a 'fatal' out
        // synchronously so the sender at least learns what happened.
        window.addEventListener('error', function(e) {
            tlog('error', 'window.onerror: ' + (e && e.message));
            broadcast('fatal', { message: String(e && e.message), source: e && e.filename, line: e && e.lineno });
        });
        window.addEventListener('unhandledrejection', function(e) {
            var reason = (e && e.reason) ? (e.reason.message || String(e.reason)) : 'unknown';
            tlog('error', 'unhandledrejection: ' + reason);
            broadcast('fatal', { message: 'unhandledrejection: ' + reason });
        });

        // ── CueTheShow slideshow engine ──────────────────────────────────
        //
        // Strategy (proven primitive only): preload every image into its own
        // plain <img> layer inside #canvas — no crossOrigin, no fetch, no
        // canvas pixel reads — which is the only ingest the Cast runtime allows
        // over plain HTTP. Once loaded, the decoded frames live in the DOM and
        // survive the iOS app / LocalHTTPServer going away, so the receiver can
        // cycle them on its own timer indefinitely. The cost is memory: N
        // decoded frames held at once — which is exactly what the heap/heartbeat
        // telemetry above lets us watch as we ramp the image count up.

        var slideshow = {
            active: false,
            paused: false,
            mode: 'sequential',
            durationMs: 30000,
            loop: true,
            images: [],         // [{ id, url, el, loaded }]
            index: -1,
            loopCount: 0,
            timer: null,
            heartbeat: null,
            startedAt: 0,
            lastShownId: null,
            lastMemWarnAt: 0
        };

        // Tear the slideshow down and free every decoded frame.
        function clearSlideshow(reason) {
            if (slideshow.timer)     { clearInterval(slideshow.timer);     slideshow.timer = null; }
            if (slideshow.heartbeat) { clearInterval(slideshow.heartbeat); slideshow.heartbeat = null; }
            for (var i = 0; i < slideshow.images.length; i++) {
                var el = slideshow.images[i].el;
                if (el) {
                    el.onload = null; el.onerror = null; el.src = '';
                    if (el.parentNode) el.parentNode.removeChild(el);
                }
            }
            var hadImages = slideshow.images.length;
            slideshow.active = false;
            slideshow.paused = false;
            slideshow.images = [];
            slideshow.index = -1;
            slideshow.loopCount = 0;
            slideshow.lastShownId = null;
            if (hadImages) tlog('info', 'slideshow cleared (' + reason + '), freed ' + hadImages + ' layers');
        }

        function checkMemory() {
            var heap = heapStats();
            if (!heap || heap.pct === null) return;
            if (heap.pct >= 80 && (Date.now() - slideshow.lastMemWarnAt) > 15000) {
                slideshow.lastMemWarnAt = Date.now();
                tlog('error', 'MEMORY WARNING heap ' + heap.pct + '%');
                broadcast('memoryWarning', { heap: heap, usagePct: heap.pct });
            }
        }

        function sendHeartbeat() {
            if (!slideshow.active) return;
            broadcast('slideshowHeartbeat', {
                index:    slideshow.index,
                total:    slideshow.images.length,
                mode:     slideshow.mode,
                loops:    slideshow.loopCount,
                paused:   slideshow.paused,
                uptimeMs: Date.now() - slideshow.startedAt,
                heap:     heapStats()
            });
        }

        // Show the next frame. Instant cut (hard swap) — no crossfade.
        function advanceSlideshow() {
            if (!slideshow.active || slideshow.paused) return;
            var loaded = slideshow.images.filter(function(it) { return it.loaded && it.el; });
            if (loaded.length === 0) return;

            var next;
            if (slideshow.mode === 'shuffle') {
                if (loaded.length === 1) {
                    next = loaded[0];
                } else {
                    do { next = loaded[Math.floor(Math.random() * loaded.length)]; }
                    while (next.id === slideshow.lastShownId);   // avoid back-to-back repeat
                }
            } else {
                var prev = slideshow.index;
                slideshow.index = (slideshow.index + 1) % loaded.length;
                if (slideshow.index === 0 && prev >= 0) slideshow.loopCount++;
                next = loaded[slideshow.index];
            }

            for (var i = 0; i < slideshow.images.length; i++) {
                if (slideshow.images[i].el) slideshow.images[i].el.classList.remove('active');
            }
            next.el.classList.add('active');
            slideshow.lastShownId = next.id;

            if (logLevel >= LOG_LEVELS.verbose) {
                broadcast('slideshowAdvanced', { index: slideshow.index, id: next.id, heap: heapStats() });
            }
            checkMemory();
        }

        function startSlideshow(data) {
            clearSlideshow('restart');               // tear down any prior show first

            // Hide the single-image layers; the slideshow uses its own layers
            // inside the same #canvas, so it inherits orientation/rotation.
            activeImg.classList.remove('active');
            standbyImg.classList.remove('active');
            splash.style.display = 'none';
            canvas.style.display = 'block';

            logLevel            = data.verbose ? LOG_LEVELS.verbose : LOG_LEVELS.info;
            slideshow.mode      = (data.mode === 'shuffle') ? 'shuffle' : 'sequential';
            slideshow.durationMs = Math.max(2000, data.durationMs || 30000);
            slideshow.loop      = data.loop !== false;
            slideshow.startedAt = Date.now();
            slideshow.active    = true;
            slideshow.paused    = false;

            var list  = data.images || [];
            var total = list.length;
            tlog('info', 'slideshow start: ' + total + ' images, mode=' + slideshow.mode +
                         ', duration=' + slideshow.durationMs + 'ms, verbose=' + (logLevel === LOG_LEVELS.verbose));

            if (total === 0) {
                broadcast('slideshowError', { phase: 'preload', message: 'empty image list' });
                clearSlideshow('empty');
                return;
            }

            var loaded = 0, failed = 0, settled = 0;

            function onSettled() {
                settled++;
                if (settled < total) return;
                var heap = heapStats();
                tlog('info', 'slideshow ready: ' + loaded + ' loaded, ' + failed + ' failed' +
                             (heap ? ', heap ' + heap.pct + '%' : ''));
                broadcast('slideshowReady', { total: total, loaded: loaded, failed: failed, heap: heap });
                checkMemory();
                if (loaded === 0) {
                    broadcast('slideshowError', { phase: 'preload', message: 'no images loaded' });
                    clearSlideshow('all-failed');
                    return;
                }
                // Kick off the autonomous loop — from here the sender can close.
                slideshow.index = -1;
                advanceSlideshow();
                slideshow.timer     = setInterval(advanceSlideshow, slideshow.durationMs);
                slideshow.heartbeat = setInterval(sendHeartbeat, 30000);  // throttled health beat
            }

            for (var i = 0; i < total; i++) {
                (function(item, idx) {
                    var el = document.createElement('img');
                    el.className = 'layer';
                    el.onload = function() {
                        item.loaded = true; loaded++;
                        tlog('verbose', 'preloaded [' + (idx + 1) + '/' + total + '] ' + item.id);
                        broadcast('slideshowLoading', { loaded: loaded, total: total, id: item.id });
                        onSettled();
                    };
                    el.onerror = function() {
                        item.loaded = false; failed++;
                        tlog('error', 'preload FAILED [' + (idx + 1) + '/' + total + '] ' + item.id + ' ' + item.url);
                        broadcast('imageLoadError', { url: item.url, index: idx, id: item.id });
                        onSettled();
                    };
                    item.el = el;
                    canvas.appendChild(el);
                    el.src = item.url;       // plain HTTP <img> load — the proven primitive
                })(list[i], i);
            }
            slideshow.images = list;
        }

        function slideshowControl(op) {
            if (op === 'pause')  { slideshow.paused = true;  tlog('info', 'slideshow paused');  broadcast('slideshowPaused',  {}); }
            else if (op === 'resume') { slideshow.paused = false; tlog('info', 'slideshow resumed'); broadcast('slideshowResumed', {}); }
            else if (op === 'stop')   { clearSlideshow('stop-command'); broadcast('slideshowStopped', {}); }
        }

        context.addCustomMessageListener(NAMESPACE, function(event) {
            var receivedAt = Date.now();
            var data = event.data;
            if (typeof data === 'string') {
                data = JSON.parse(data);
            }

            if (data.action === 'show') {
                // A single image (album art, movie poster, auto-push) permanently
                // stops any running slideshow and displays the new image.
                clearSlideshow('single-image');
                standbyImg.onload = function() {
                    splash.style.display = 'none';
                    canvas.style.display = 'block';
                    activeImg.classList.remove('active');
                    standbyImg.classList.add('active');
                    var temp = activeImg;
                    activeImg = standbyImg;
                    standbyImg = temp;
                    sendMessage(event.senderId, {
                        event: 'imageDisplayed',
                        url: data.url,
                        ts: Date.now(),
                        processingMs: Date.now() - receivedAt
                    });
                };
                standbyImg.onerror = function() {
                    sendMessage(event.senderId, {
                        event: 'error',
                        message: 'Failed to load image',
                        url: data.url,
                        ts: Date.now(),
                        processingMs: Date.now() - receivedAt
                    });
                };
                standbyImg.src = data.url;
            }

            else if (data.action === 'setOrientation') {
                applyRotation(data.rotation || 0);
                sendMessage(event.senderId, {
                    event: 'orientationSet',
                    rotation: currentRotation,
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }

            else if (data.action === 'clear') {
                clearSlideshow('clear-command');
                // Detach load/error handlers BEFORE clearing src —
                // setting src='' triggers onerror, which would fire
                // the stale handler from the last 'show' command and
                // send a spurious "Failed to load image" error.
                activeImg.onload = null;
                activeImg.onerror = null;
                standbyImg.onload = null;
                standbyImg.onerror = null;
                activeImg.classList.remove('active');
                standbyImg.classList.remove('active');
                activeImg.src = '';
                standbyImg.src = '';
                canvas.style.display = 'none';
                splash.style.display = 'flex';
                sendMessage(event.senderId, { event: 'cleared', ts: Date.now(), processingMs: Date.now() - receivedAt });
            }

            else if (data.action === 'testRotation') {
                // Diagnostic: cycle through all four rotation values (0, 90, 180, 270)
                // with the current image visible, pausing 5s on each. Overlays the
                // current rotation value so the user can identify which looks correct.
                var rotations = [0, 90, 180, 270];
                var overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;top:20px;left:20px;z-index:999;' +
                    'color:#fff;font-size:48px;font-family:monospace;' +
                    'background:rgba(0,0,0,0.7);padding:12px 24px;border-radius:8px;';
                document.body.appendChild(overlay);
                var idx = 0;
                function nextRotation() {
                    if (idx >= rotations.length) {
                        document.body.removeChild(overlay);
                        // Restore original rotation
                        applyRotation(data.originalRotation || 0);
                        sendMessage(event.senderId, {
                            event: 'testRotationComplete',
                            tested: rotations,
                            ts: Date.now(),
                            processingMs: Date.now() - receivedAt
                        });
                        return;
                    }
                    var deg = rotations[idx];
                    overlay.textContent = 'CSS rotate(' + deg + 'deg)';
                    applyRotation(deg);
                    idx++;
                    setTimeout(nextRotation, 5000);
                }
                nextRotation();
            }

            else if (data.action === 'getVisibility') {
                // On-demand visibility query — used by the sender after
                // app restart to check if an existing receiver session
                // is hidden behind the home screen.
                sendMessage(event.senderId, {
                    event: 'visibility',
                    isVisible: receiverVisible,
                    documentHidden: document.hidden,
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }

            else if (data.action === 'slideshow') {
                startSlideshow(data);
                sendMessage(event.senderId, {
                    event: 'slideshowStarted',
                    total: (data.images || []).length,
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }

            else if (data.action === 'slideshowControl') {
                slideshowControl(data.op);
            }

            else if (data.action === 'replace') {
                // Swap the image set without ending the Cast session.
                startSlideshow(data);
                sendMessage(event.senderId, {
                    event: 'slideshowReplaced',
                    total: (data.images || []).length,
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }

            else if (data.action === 'getSlideshowStatus') {
                sendMessage(event.senderId, {
                    event: 'slideshowStatus',
                    active: slideshow.active,
                    paused: slideshow.paused,
                    mode: slideshow.mode,
                    index: slideshow.index,
                    total: slideshow.images.length,
                    loops: slideshow.loopCount,
                    durationMs: slideshow.durationMs,
                    uptimeMs: slideshow.active ? (Date.now() - slideshow.startedAt) : 0,
                    heap: heapStats(),
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }

            else if (data.action === 'getInfo') {
                var dpr = window.devicePixelRatio || 1;
                // Report everything about the display pipeline so we can
                // diagnose portrait vs landscape rendering on different TVs.
                var screenInfo = {};
                try {
                    screenInfo.screenWidth = window.screen.width;
                    screenInfo.screenHeight = window.screen.height;
                    screenInfo.screenAvailWidth = window.screen.availWidth;
                    screenInfo.screenAvailHeight = window.screen.availHeight;
                    if (window.screen.orientation) {
                        screenInfo.orientationType = window.screen.orientation.type;
                        screenInfo.orientationAngle = window.screen.orientation.angle;
                    }
                    screenInfo.outerWidth = window.outerWidth;
                    screenInfo.outerHeight = window.outerHeight;
                    screenInfo.docWidth = document.documentElement.clientWidth;
                    screenInfo.docHeight = document.documentElement.clientHeight;
                } catch(e) {
                    screenInfo.error = e.message;
                }
                sendMessage(event.senderId, {
                    event: 'info',
                    width: Math.round(window.innerWidth * dpr),
                    height: Math.round(window.innerHeight * dpr),
                    rotation: currentRotation,
                    devicePixelRatio: dpr,
                    screen: screenInfo,
                    ts: Date.now(),
                    processingMs: Date.now() - receivedAt
                });
            }
        });

        context.addEventListener(cast.framework.system.EventType.READY, function() {
            console.log('PosterCue receiver ready');
        });

        // PosterCue is a non-media receiver (static images, not streaming).
        // Two timeouts must be addressed to prevent unexpected disconnects:
        //
        // 1. disableIdleTimeout: The Cast platform kills receivers after ~5 min
        //    when no active media session exists. Since PosterCue never plays
        //    media, the platform always considers it "idle." This disables that
        //    platform-level idle kill entirely. Google's docs: "should only be
        //    used for non-media apps" — which is exactly what PosterCue is.
        //
        // 2. maxInactivity: Sender↔receiver heartbeat timeout. How long the
        //    receiver waits without hearing from the sender app before closing.
        //    Set to 86400s (24 hours) so the session survives long periods
        //    between image pushes. Minimum is 5s (0 breaks connections).
        var options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.maxInactivity = 86400;
        context.start(options);
    </script>
</body>
</html>
