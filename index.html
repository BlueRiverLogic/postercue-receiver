<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
        .layer.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <img id="img1" class="layer active">
    <img id="img2" class="layer">

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const NAMESPACE = 'urn:x-cast:com.postercue.image';

        let activeImg = document.getElementById('img1');
        let standbyImg = document.getElementById('img2');

        context.addCustomMessageListener(NAMESPACE, function(event) {
            var data = event.data;
            if (typeof data === 'string') {
                data = JSON.parse(data);
            }

            if (data.action === 'show') {
                standbyImg.onload = function() {
                    activeImg.classList.remove('active');
                    standbyImg.classList.add('active');
                    var temp = activeImg;
                    activeImg = standbyImg;
                    standbyImg = temp;
                };
                standbyImg.onerror = function() {
                    console.error('Failed to load image:', data.url);
                };
                standbyImg.src = data.url;
            }
        });

        context.start();
    </script>
</body>
</html>
